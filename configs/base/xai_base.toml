[inference]
batch_size = 64
use_tta = false
use_qe = false
use_rerank = false

[evaluation]
checkpoint_dir = "inference_model"       

[data]
num_workers = 4
split_data_path = "splits/strclosed_set__dupFalse__kTrain3__kVal3__p4/full_split.parquet"
use_fiftyone = false

[split]
include_duplicates = false
seed = 51

[xai]
dataset_name = "jaguar_splits_curated"
split_name = "val"
n_samples = 150      # "full"
seed = 51
explainer_names = ["IG", "GradCAM"]
pair_types = ["easy_pos", "hard_neg", "hard_pos"]

ig_steps = 50
ig_internal_bs = 64
ig_batch_size = 64


[xai_metrics.faithfulness]
steps = 30
baseline = "blur"          # "blur", "zeros"
use_abs = true

[xai_metrics.complexity]
abs = true
normalise = true
display_progressbar = true


[logging]
enabled = true
mode = "online"