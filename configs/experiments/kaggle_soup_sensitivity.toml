[experiment]
name = "kaggle_soup_sensitivity"
description = """
Evaluate retrieval across multiple training seeds, optimizers, and schedulers by measuring mean, 
variance and computing model soups (weight averaging).
"""
base_config = "base/kaggle_base"
mode = "kaggle"
setup_name = "kaggle_base"
output_profile = "soup_sensitivity"

# ----------seed stability analysis----------

[[experiment.runs]]
experiment_name = "stability_analysis"
group_by = "training"
build_model_soup = true
apply_tta = true
tta_modality = "flip"
apply_qe = true
top_k_expansion = 3
apply_rerank = false

# ----------optimizer vs scheduler----------

[[experiment.runs]]
experiment_name = "optimizer_sensitivity"
group_by = "optimizer"
build_model_soup = false
apply_tta = true
tta_modality = "flip"
apply_qe = true
top_k_expansion = 3
apply_rerank = false

[[experiment.runs]]
experiment_name = "scheduler_sensitivity"
group_by = "scheduler"
build_model_soup = false
apply_tta = true
tta_modality = "flip"
apply_qe = true
top_k_expansion = 3
apply_rerank = false

# ----------full grid comparison----------

[[experiment.runs]]
experiment_name = "full_training_grid"
group_by = "grid"
build_model_soup = false
apply_tta = true
tta_modality = "flip"
apply_qe = true
top_k_expansion = 3
apply_rerank = false