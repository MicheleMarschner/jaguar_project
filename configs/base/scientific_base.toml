[model]
backbone_name = "EfficientNet-B4"
head_type = "arcface"
emb_dim = 1024
freeze_backbone = true
s = 30.0
m = 0.50

[split]
strategy = "closed_set"
include_duplicates = false
val_split_size = 0.2
seed = 51

[data]
split_data_path = "splits/strclosed_set__dupFalse__kTrain3__kVal4__p13/full_split.parquet"
dataset_name = "jaguar_stage0"
use_balanced_sampler = false
num_workers = 0

[curation]
train_k = 1
val_k = 50
phash_threshold = 4


[preprocessing]
train_background = "random_bg"
val_background = "blur_bg"
bg_dir = "data/round_1/backgrounds"
p_original = 0.5
edge_softness = 2
blur_radius = 10
key_for_seed = "filename"

[training]
monitor_metric = "mAP"
save_dir = "checkpoints/round_1/"            # "/media/vanessa/UBUNTU1/home/vanessa/Documents/jaguar_checkpoints/"
experiment_name = "scientific_base"
epochs = 1
batch_size = 16
lr = 2e-5
weight_decay = 1e-3
seed = 42
early_stopping = true
early_stopping_patience = 5

[optimizer]
type = "Adam"
lr = 1e-5
weight_decay = 1e-3
momentum = 0.9
betas = [0.9, 0.999]

[scheduler]
type = "JaguardIdScheduler"
T_max = 30
lr_start = 1e-5
lr_min = 9e-6
lr_max = 1e-3
lr_ramp_ep = 15
lr_sus_ep = 0
lr_decay = 0.8

[augmentation]
apply_augmentations = true
horizontal_flip = true
affine_degrees = 15
affine_translate = [0.15, 0.15]
affine_scale = [0.85, 1.15]
color_jitter_brightness = 0.2
color_jitter_contrast = 0.2
random_erasing_p = 0.25


[evaluation]
extra_val_backgrounds = ["original", "gray_bg"]


[xai]
seed = 51
n_samples = 100
ig_steps = 10