[model]
backbone_name = "EVA-02"   # Options: "EVA-02", "MegaDescriptor-L", "MiewID", "DINO-Small", "DINOv2-Base", "DINOv3-Base", "DINOv3-Large", "DINOv2_for_wildlife", "ConvNeXt-V2", "EfficientNet-B4", "Swin-Transformer" 
head_type = "arcface"
emb_dim = 1024
freeze_backbone = true
s = 30.0
m = 0.50
use_projection = true
use_forward_features = false

[split]
strategy = "closed_set"
val_split_size = 0.2   #0.2 round_2, 0.05 round_1
include_duplicates = true
seed = 42

[data]
split_data_path = "splits/default_kaggle/full_split.parquet"
dataset_name = "jaguar_stage0"
use_balanced_sampler = false    # Set to true to handle class imbalance
num_workers = 32

[curation]
train_k = 1
val_k = 50
phash_threshold = 4

[preprocessing]
train_background = "original"
val_background = "original"
bg_dir = "data/round_2/backgrounds"
p_original = 0.5
edge_softness = 2
blur_radius = 10
key_for_seed = "filename"

[training]
monitor_metric = "pairwise_AP"
save_dir = "/fast/AG_Kainmueller/data/jaguar_project/jaguar_checkpoints/round_2/" 
# save_dir = "checkpoints/round_1/"  
experiment_name = "kaggle_base"
epochs = 30
batch_size = 16
seed = 42
early_stopping = true
early_stopping_patience = 5
# ---Fine-tuning Params---
unfreeze_epoch = 5       # At epoch 5, start training part of the backbone; ; if set to 0 the backbone stays frozen
unfreeze_blocks = 2      # Number of blocks (from the end) to unfreeze; if set to 0 the backbone stays frozen

