[experiment]
name = "baseline"
description = "Train one single model on the data"
base_config = "base/kaggle_base"
mode = "kaggle"
train_type = "kaggle"
setup_name = "kaggle_base"
output_profile = "baseline"

[[experiment.runs]]
experiment_name = "baseline_init"
backbone_name = "EVA-02"   # Options: "EVA-02", "MegaDescriptor-L", "MiewID", "DINO-Small", "DINOv2-Base", "DINOv3-Base", "DINOv3-Large", "DINOv2_for_wildlife", "ConvNeXt-V2", "EfficientNet-B4", "Swin-Transformer" 
head_type = "arcface"   # Options: "arcface"
emb_dim = 1024
freeze_backbone = true
s = 30.0
m = 0.50
use_projection = true
use_forward_features = false
mining_type = "hard"
strategy = "closed_set"
val_split_size = 0.2  
include_duplicates = true
seed = 42
split_data_path = "/splits/strclosed_set__dupTrue__kTrain1__kVal50__p4/full_split.parquet"
dataset_name = "jaguar_stage0"
use_balanced_sampler = false    # Set to true to handle class imbalance
num_workers = 4
use_fiftyone = false
train_k = 1
val_k = 30    #50
phash_threshold = 4
train_background = "original"
val_background = "original"
bg_dir = "data/round_2/backgrounds"
p_original = 0.5
edge_softness = 2
blur_radius = 10
key_for_seed = "filename"
monitor_metric = "pairwise_AP"      # Options: "mAP"; "pairwise_AP"
save_dir = "checkpoints/round_2/"  
experiment_name = "kaggle_base"
epochs = 30
batch_size = 32  # 16
samples_per_class = 4
seed = 42
early_stopping = true
early_stopping_patience = 5
# ---Fine-tuning Params---
unfreeze_epoch = 0       # At epoch 5, start training part of the backbone; ; if set to 0 the backbone stays frozen
unfreeze_blocks = 2      # Number of blocks (from the end) to unfreeze; if set to 0 the backbone stays frozen
# ---EMA Params---
ema = false
ema_decay = 0.995
type = "Adam"         # Options: "Adam", "AdamW", "SGD", "Lion", "Muon" etc.
lr = 1e-3              # lr_start = 1e-5 for custom scheduler; 2e-5 for AdamW
lr_muon = 0.005        # Muon branch; backbone weights
weight_decay = 1e-4
momentum = 0.9          # Only used for SGD
betas = [0.9, 0.999]    # Only used for Adam/AdamW
backbone_lr = 2e-6       # Keep this very small (1/10th or 1/100th of head LR)
factor = 0.1             # ReduceLROnPlateau
patience = 2             # ReduceLROnPlateau
type = "CosineAnnealingLR"  # Options: "CosineAnnealingLR", "OneCycleLR", "ReduceLROnPlateau", "JaguardIdScheduler"
T_max = 30                  # CosineAnnealingLR
lr_start = 1e-5             # custom 
lr_min = 9e-6               # Cosine or custom or ReduceLROnPlateau
lr_max = 1e-3               # Custom or OneCycle
lr_ramp_ep = 15             # Custom
lr_sus_ep = 0               # Custom
lr_decay = 0.8              # Custom
apply_augmentations = false
horizontal_flip = true
random_resized_crop = false
gaussian_blur = false
affine_degrees = 15
affine_translate = [0.15, 0.15]
affine_scale = [0.85, 1.15]
color_jitter_brightness = 0.2
color_jitter_contrast = 0.2
random_erasing_p = 0.25
silhouette_freq = 5         # Compute Silhouette and refresh viz data every x epochs if force_silhouette true
force_silhouette = false    # Set to true for the mining RQ study
enabled = false
stage_epochs = []       # [10, 10, 10]
enabled = true
project = "jaguar-reid-SpotItLikeItsHot"
mode = "online"

