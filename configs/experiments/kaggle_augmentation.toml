[experiment]
name = "kaggle_augmentation"
description = "Augmentation ablation around current full augmentation setup."
base_config = "base/kaggle_base"
mode = "train"
train_type = "kaggle"
setup_name = "kaggle_base"
output_profile = "augmentation"

[[experiment.runs]]
experiment_name = "aug_none"
apply_augmentations = false

[[experiment.runs]]
experiment_name = "aug_full"
apply_augmentations = true
horizontal_flip = true
affine_degrees = 15
affine_translate = [0.15, 0.15]
affine_scale = [0.85, 1.15]
color_jitter_brightness = 0.2
color_jitter_contrast = 0.2
random_erasing_p = 0.25

[[experiment.runs]]
experiment_name = "aug_no_erasing"
apply_augmentations = true
horizontal_flip = true
affine_degrees = 15
affine_translate = [0.15, 0.15]
affine_scale = [0.85, 1.15]
color_jitter_brightness = 0.2
color_jitter_contrast = 0.2
random_erasing_p = 0.0

[[experiment.runs]]
experiment_name = "aug_geom_only"
apply_augmentations = true
horizontal_flip = true
affine_degrees = 15
affine_translate = [0.15, 0.15]
affine_scale = [0.85, 1.15]
color_jitter_brightness = 0.0
color_jitter_contrast = 0.0
random_erasing_p = 0.0

[[experiment.runs]]
experiment_name = "aug_geom_plus_erase"
apply_augmentations = true
horizontal_flip = true
affine_degrees = 15
affine_translate = [0.15, 0.15]
affine_scale = [0.85, 1.15]
color_jitter_brightness = 0.0
color_jitter_contrast = 0.0
random_erasing_p = 0.25