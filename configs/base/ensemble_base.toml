[ensemble]
name = "eva02_mega_conv"

[fusion]
type = "score_average"         # score_average, score_average_minmax, score_average_minmax_squared
weights = [0.4, 0.2, 0.4]
normalize_per_model = true
square_before_fusion = true

[split]
include_duplicates = true
seed = 42

[data]
split_data_path = "splits/default_kaggle/full_split.parquet"
dataset_name = "jaguar_stage0"
num_workers = 4
use_fiftyone = false

[[members]]
name = "EVA-02"
checkpoint_path = "backbone_eva02.toml"

[[members]]
name = "MiewID"
checkpoint_path = "configs/_generated/train_single_baseline/backbone_miewid.toml"

[inference]
batch_size = 16
use_tta = true
use_qe = false
use_rerank = false

[logging]
enabled = true
project = "jaguar-reid-SpotItLikeItsHot"
mode = "online"