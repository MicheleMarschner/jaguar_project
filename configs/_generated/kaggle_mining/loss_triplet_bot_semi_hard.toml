[training]
experiment_name = "loss_triplet_bot_semi_hard"
early_stopping = false
unfreeze_epoch = 5
samples_per_class = 4

[model]
head_type = "triplet"
m = 0.7
mining_type = "semi-hard"

[mining_analysis]
silhouette_freq = 5
force_silhouette = true

[optimizer]
lr = 3.5e-05

[scheduler]
lr_start = 3.5e-05
lr_max = 0.00035

[output]
profile = "mining"
experiment_group = "kaggle_mining"

[data]
split_data_path = "/splits/strclosed_set__dupFalse__kTrain3__kVal3__p4/full_split.parquet"
