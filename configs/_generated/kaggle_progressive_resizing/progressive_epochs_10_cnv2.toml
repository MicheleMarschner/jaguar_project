[training]
experiment_name = "progressive_epochs_10_cnv2"
unfreeze_epoch = 3
unfreeze_blocks = 100
epochs = 30

[model]
backbone_name = "ConvNeXt-V2"
m = 0.7

[progressive_resizing]
enabled = true
stage_epochs = [10, 10, 10]

[augmentation]
random_resized_crop = true

[output]
profile = "resizing"
experiment_group = "kaggle_progressive_resizing"

[data]
split_data_path = "/splits/default_kaggle/full_split.parquet"
