[model]
backbone_name = "EVA-02"
head_type = "arcface"
emb_dim = 1024
freeze_backbone = true
s = 30.0
m = 0.50

[data]
dataset_name = "jaguar_stage0"
split_data_path = "splits/default_kaggle/full_split.parquet"
val_split = 0.05
use_balanced_sampler = false
num_workers = 32
include_duplicates = true

[preprocessing]
train_background = "original"
val_background = "original"
bg_dir = "/path/to/backgrounds"
p_original = 0.5
edge_softness = 2
blur_radius = 10
key_for_seed = "filename"

[training]
monitor_metric = "pairwise_AP"
save_dir = "checkpoints/round_1/"  
experiment_name = "kaggle_base"
epochs = 30
batch_size = 16
lr = 2e-5
weight_decay = 1e-3
seed = 42
early_stopping = true
early_stopping_patience = 5

[optimizer]
optimizer_type = "Adam"
optimizer_lr = 1e-5
optimizer_weight_decay = 1e-3
optimizer_momentum = 0.9
optimizer_betas = [0.9, 0.999]

[scheduler]
scheduler_type = "JaguardIdScheduler"
scheduler_T_max = 30
scheduler_lr_start = 1e-5
scheduler_lr_min = 9e-6
scheduler_lr_max = 1e-3
scheduler_lr_ramp_ep = 15
scheduler_lr_sus_ep = 0
scheduler_lr_decay = 0.8

[augmentation]
apply_augmentations = true
horizontal_flip = true
affine_degrees = 15
affine_translate = [0.15, 0.15]
affine_scale = [0.85, 1.15]
color_jitter_brightness = 0.2
color_jitter_contrast = 0.2
random_erasing_p = 0.25

[progressive_resizing]
[progressive_resizing]
enabled = false
sizes = []              # [224, 384, 512]
stage_epochs = []       # [10, 10, 10]