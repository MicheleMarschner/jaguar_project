[experiment]
name = "kaggle_backbone"
description = "Backbone ablation for Kaggle-oriented training runs."
base_config = "base/kaggle_base"
mode = "kaggle"
setup_name = "kaggle_base"
output_profile = "backbone"

[[experiment.runs]]
experiment_name = "backbone_eva02"
backbone_name = "EVA-02"
split_data_path = "/splits/default_kaggle/full_split.parquet"
head_type = "triplet_focal"

[[experiment.runs]]
experiment_name = "backbone_megadescriptor_l"
backbone_name = "MegaDescriptor-L"
split_data_path = "/splits/default_kaggle/full_split.parquet"
head_type = "triplet_focal"

[[experiment.runs]]
experiment_name = "backbone_miew_id"
backbone_name = "MiewID"
split_data_path = "/splits/default_kaggle/full_split.parquet"
head_type = "triplet_focal"

