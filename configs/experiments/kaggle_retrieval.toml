[experiment]
name = "kaggle_retrieval"

[[experiment.runs]]
experiment_name = "baseline_retrieval"
apply_tta = false

[[experiment.runs]]
experiment_name = "tta_flip_retrieval"
apply_tta = true
tta_modality = "flip"

# [[experiment.runs]]
# experiment_name = "tta_multiscale_retrieval"
# apply_tta = true
# tta_modality = "multiscale"

[[experiment.runs]]
experiment_name = "qe_retrieval"
apply_qe = true
top_k_expansion = [3,5,7,10]

[[experiment.runs]]
experiment_name = "qe_rerank_retrieval"
apply_qe = true
top_k_expansion = [5,7]
apply_rerank = true
k1 = [20,30,50]
k2 = [6,8,10]
lambda_value = [0.3,0.5]

[[experiment.runs]]
experiment_name = "tta_qe_retrieval"
apply_tta = true
tta_modality = "flip"
apply_qe = true
top_k_expansion = [3]

[[experiment.runs]]
experiment_name = "tta_qe_rerank_retrieval"
apply_tta = true
tta_modality = "flip"
apply_qe = true
top_k_expansion = [3]
apply_rerank = true
k1 = [15]
k2 = [6]
lambda_value = [0.3]
