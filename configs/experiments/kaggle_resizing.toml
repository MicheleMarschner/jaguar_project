[experiment]
name = "kaggle_progressive_resizing"
description = "Fixed resolution versus progressive resizing in pre-trained models that allow it."
base_config = "base/kaggle_base"
mode = "kaggle"
setup_name = "kaggle_base"
output_profile = "resizing"

[[experiment.runs]]
experiment_name = "no_progressive_cnv2"
backbone_name = "ConvNeXt-V2"
#unfreeze_epoch = 3
unfreeze_blocks = 100  
pr_enabled = false
epochs = 50
# s = 40    # parameters for Arcface only
# m = 0.40
m = 0.7
random_resized_crop = true
# split_data_path = "/splits/default_kaggle/full_split.parquet" # only for round_1 !

[[experiment.runs]]
experiment_name = "progressive_epochs_10_cnv2"
backbone_name = "ConvNeXt-V2"
# s = 40 # higher scale and lower intra-margin class variation 
# m = 0.40
m = 0.7 
pr_enabled = true
pr_stage_epochs = [10, 10, 10]
unfreeze_epoch = 3
unfreeze_blocks = 100  
# optimizer_backbone_lr = 1e-5 
epochs = 30
random_resized_crop = true
# split_data_path = "/splits/default_kaggle/full_split.parquet" # only for round_1 !

[[experiment.runs]]
experiment_name = "progressive_varying_epochs_cnv2"
backbone_name = "ConvNeXt-V2"
# s = 40
# m = 0.40
pr_enabled = true
pr_stage_epochs = [5, 10, 15]
unfreeze_epoch = 3
unfreeze_blocks = 100  
# optimizer_backbone_lr = 1e-5 
epochs = 30
#random_resized_crop = true
# split_data_path = "/splits/default_kaggle/full_split.parquet" # only for round_1 !
