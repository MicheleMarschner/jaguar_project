[experiment]
name = "scientific_deduplication"
description = "Deduplication / curation ablation with burst and split artifacts as prerequisites."
base_config = "base/scientific_base"
mode = "scientific"
setup_name = "scientific_deduplication"
output_profile = "deduplication"

[[experiment.runs]]
experiment_name = "closed_keep_all"
split_strategy = "closed_set"
include_duplicates = true

[[experiment.runs]]
experiment_name = "closed_curated_traink_1_valk_50_p4"
split_strategy = "closed_set"
include_duplicates = false
train_k = 1
val_k = 50
phash_threshold = 4

[[experiment.runs]]
experiment_name = "closed_curated_traink_3_valk_5_p4"
split_strategy = "closed_set"
include_duplicates = false
train_k = 3
val_k = 5
phash_threshold = 4
