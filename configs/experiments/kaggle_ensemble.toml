[experiment]
name = "kaggle_ensemble"
description = "Targeted score-fusion sweeps across complementary backbone families"
base_config = "base/ensemble_base"
mode = "ensemble"
output_profile = "ensemble"
setup_name = "base"


[[experiment.runs]]
experiment_name = "eva_miew_convnext_weighted_globalminmax_sq"
weights = [0.4, 0.4, 0.2]
normalize_mode = "global_minmax"
square_before_fusion = true

[[experiment.runs.members]]
name = "EVA-02"
checkpoint_path = "kaggle_backbone/backbone_eva02"
config_path = "kaggle_backbone/backbone_eva02/config_leaderboard_exp.toml"
cache_prefix = "backbone_eva02"

