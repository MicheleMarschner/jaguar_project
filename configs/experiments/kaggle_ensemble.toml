[experiment]
name = "kaggle_ensemble"
description = "Score-fusion sweep for 3-model Jaguar ensemble."
base_config = "base/ensemble_base"
mode = "ensemble"
output_profile = "ensemble"

[[experiment.runs]]
experiment_name = "ens3_equal_global"
weights = [0.3333, 0.3333, 0.3334]
normalize_mode = "global_minmax"
square_before_fusion = true

[[experiment.runs]]
experiment_name = "ens3_model1_stronger"
weights = [0.5, 0.25, 0.25]
normalize_mode = "global_minmax"
square_before_fusion = true

[[experiment.runs]]
experiment_name = "ens3_model2_stronger"
weights = [0.25, 0.5, 0.25]
normalize_mode = "global_minmax"
square_before_fusion = true

[[experiment.runs]]
experiment_name = "ens3_model3_stronger"
weights = [0.25, 0.25, 0.5]
normalize_mode = "global_minmax"
square_before_fusion = true

[[experiment.runs]]
experiment_name = "ens3_equal_rowminmax"
weights = [0.3333, 0.3333, 0.3334]
normalize_mode = "row_minmax"
square_before_fusion = true

[[experiment.runs]]
experiment_name = "ens3_equal_rowzscore"
weights = [0.3333, 0.3333, 0.3334]
normalize_mode = "row_zscore"
square_before_fusion = true

[[experiment.runs]]
experiment_name = "ens3_equal_no_square"
weights = [0.3333, 0.3333, 0.3334]
normalize_mode = "global_minmax"
square_before_fusion = false

[[experiment.runs]]
experiment_name = "ens3_equal_no_norm"
weights = [0.3333, 0.3333, 0.3334]
normalize_mode = "none"
square_before_fusion = true